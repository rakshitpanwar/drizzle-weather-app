<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="container">
      <!-- Top Panel: Current Weather -->
      <div class="weather-panel top-panel">
        <div class="header-actions">
          <div class="location-header">
            <svg class="loc-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            <h1 id="city-name">City</h1>
            <button id="unit-toggle" class="unit-toggle">°C</button>
          </div>
        </div>

        <!-- Search Bar integrated cleanly -->
        <div class="input-container">
          <input type="text" id="city-input" placeholder="Search for a city..." />
          <button id="get-weather-btn">
             <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
          </button>
        </div>
        <div id="recent-searches" class="recent-searches"></div>

        <div id="loading" class="hidden">
          <div class="spinner"></div>
          <p>Fetching weather...</p>
        </div>
        <p id="error-message" class="hidden">City not found. Please try again.</p>

        <div id="weather-info" class="hidden">
          <div class="main-weather">
             <img id="weather-icon" src="" alt="Weather Icon" />
             <div class="temp-display">
                <span id="temperature"></span>
                <span class="degree-symbol">°</span>
             </div>
             <p id="description">Weather</p>
             <p id="date-display" class="date-text">Monday, 17 May</p>
          </div>
          
          <div class="metrics-row">
            <div class="metric">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"></path></svg>
              <span id="wind-speed" class="val">--</span>
              <span class="lbl">Wind</span>
            </div>
            <div class="metric">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"></path></svg>
              <span id="humidity" class="val">--</span>
              <span class="lbl">Humidity</span>
            </div>
            <div class="metric">
               <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 13v-2a4 4 0 0 0-8 0v2M12 20v-6"></path><circle cx="12" cy="10" r="1"></circle></svg>
              <span id="chance-of-rain" class="val">--</span>
              <span class="lbl">Chance of rain</span>
            </div>
          </div>
        </div>
      </div>

      <!-- Bottom Panel: Forecast -->
      <div class="forecast-panel bottom-panel hidden" id="forecast-panel">
        
        <!-- Hourly / Today Forecast -->
        <div class="hourly-section">
          <div class="section-header">
            <h3>Today</h3>
            <span class="action-text">5 days</span>
          </div>
          <div id="hourly-list" class="hourly-list">
             <!-- Hourly injected here -->
          </div>
        </div>

        <!-- Daily Forecast List -->
        <div class="daily-section">
          <div id="daily-list" class="daily-list">
             <!-- Daily injected here -->
          </div>
        </div>

      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
